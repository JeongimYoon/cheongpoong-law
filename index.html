<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>청풍로펌 가족·상속센터</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>

body{
margin:0;
font-family:'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
background:#f7f5f3;
color:#2b2b2b;
}

.container{
width:1100px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:30px 0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
}

.logo img{
height:40px;
}

nav{
display:flex;
gap:40px;
font-size:15px;
}

.call-btn{
background:#6d4c54;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:500;
}

.hero{
display:flex;
align-items:center;
gap:60px;
margin-top:40px;
}

.hero-text{
flex:1;
}

.hero-text h1{
font-size:48px;
line-height:1.4;
letter-spacing:-0.02em;
margin-bottom:20px;
}

.hero-text p{
font-size:17px;
line-height:1.7;
color:#666;
margin-bottom:30px;
}

.buttons{
display:flex;
gap:15px;
}

.btn{
padding:14px 24px;
border-radius:30px;
font-weight:500;
}

.phone{
background:#6d4c54;
color:white;
}

.info{
background:white;
border:1px solid #ddd;
}

.kakao{
background:#ffe812;
}

.profile{
flex:1;
}

.profile img{
width:100%;
border-radius:20px;
}

.features{
margin-top:80px;
display:flex;
gap:20px;
}

.feature{
background:white;
padding:30px;
border-radius:15px;
flex:1;
text-align:center;
font-weight:500;
}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo2.png">
<div>
<div>청풍로펌</div>
<div style="font-size:13px;color:#777">가족·상속센터</div>
</div>
</div>

<nav>
<div>변호사 소개</div>
<div>업무 분야</div>
<div>상담 절차</div>
<div>자주 묻는 질문</div>
</nav>

<div class="call-btn">
전화 상담 010-2268-1277
</div>

</header>


<section class="hero">

<div class="hero-text">

<h1>
가족관계의 어려운 문제,<br>
혼자 견디지 않도록<br>
따뜻하게 함께하겠습니다.
</h1>

<p>
힘든 시간을 지나고 있는 의뢰인께 가장 필요한 것은
차가운 말보다 차분한 설명과 믿을 수 있는 방향이라고 생각합니다.
청풍로펌 가족·상속센터는 이혼·가사·상속 사건을
친절하고 세심하게 상담하고 끝까지 책임 있게 대응합니다.
</p>

<div class="buttons">

<div class="btn phone">
전화 상담하기
</div>

<div class="btn info">
상담 안내 보기
</div>

<div class="btn kakao">
카카오톡 상담
</div>

</div>

</div>


<div class="profile">
<img src="profile.jpg">
</div>

</section>


<section class="features">

<div class="feature">
따뜻한 상담
</div>

<div class="feature">
세심한 공감
</div>

<div class="feature">
분명한 대응
</div>

<div class="feature">
끝까지 동행
</div>

</section>

</div>

</body>
</html>
